<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fingerboard Hero - Sideways Grinds</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Arial Black', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px #000; pointer-events: none; z-index: 10; display: none; }
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; color: white; z-index: 20;
        }
        #trick-alert { position: absolute; top: 30%; left: 50%; transform: translateX(-50%); color: #00ff00; font-size: 2.5rem; text-shadow: 3px 3px #000; font-style: italic; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
        #flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; z-index: 30; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="flash"></div>
    <div id="trick-alert">TRICK!</div>
    <div id="overlay">
        <h1>FINGERBOARD HERO</h1>
        <p>PRESS [SPACE] TO START</p>
    </div>
    <div id="ui">
        <h1 style="margin:0">SCORE: <span id="score">0</span></h1>
        <h2 id="multiplier" style="margin:0">COMBO x1</h2>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

        let gameActive = false, isGrounded = true, isGrinding = false;
        let score = 0, multiplier = 1, speed = 0.45, velocityY = 0;
        let spacePressed = false, lastSpaceRelease = 0;
        const GRAVITY = -0.014, JUMP_FORCE = 0.38;

        let camX = 12, camZ = 8, targetCamX = 12, targetCamZ = 8;
        const LERP_SPEED = 0.05;

        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x87CEEB, 20, 150);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        // --- BOARD ---
        const boardGroup = new THREE.Group();
        const deck = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.15, 3.5), new THREE.MeshStandardMaterial({ color: 0x222222 }));
        boardGroup.add(deck);
        [[0.5,-0.3,1.2], [-0.5,-0.3,1.2], [0.5,-0.3,-1.2], [-0.5,-0.3,-1.2]].forEach(p => {
            const w = new THREE.Mesh(new THREE.CylinderGeometry(0.28,0.28,0.2,8), new THREE.MeshStandardMaterial({color:0xffffff}));
            w.position.set(...p); w.rotation.z = Math.PI/2; boardGroup.add(w);
        });
        boardGroup.position.y = 0.5;
        scene.add(boardGroup);

        // --- OBSTACLES ---
        const obstacles = [];
        function createBanner(text) {
            const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(255, 255, 0, 0.9)'; ctx.fillRect(0,0,256,64);
            ctx.font = 'bold 35px Arial'; ctx.fillStyle = 'black'; ctx.textAlign = 'center';
            ctx.fillText(text, 128, 45);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
            sprite.scale.set(4, 1, 1); sprite.position.y = 3;
            return sprite;
        }

        function spawnObstacle() {
            const isRail = Math.random() > 0.4;
            const len = isRail ? 12 + Math.random() * 20 : 0.6; // Longer rails for "long slides"
            const obs = new THREE.Mesh(
                new THREE.BoxGeometry(isRail ? 0.4 : 5, isRail ? 0.4 : 1.2, len),
                new THREE.MeshStandardMaterial({ color: isRail ? 0xffcc00 : 0xff4444 })
            );
            const type = isRail ? "SLIDE" : (Math.random() > 0.5 ? "JUMP" : "TRICK");
            obs.add(createBanner(type));
            obs.userData = { isRail, type, halfLen: len/2, matched: false };
            obs.position.set(0, isRail ? 1.2 : 0.6, -150);
            scene.add(obs);
            obstacles.push(obs);
        }

        const floor = [];
        for(let i=0; i<25; i++) {
            const t = new THREE.Mesh(new THREE.PlaneGeometry(60, 10), new THREE.MeshStandardMaterial({ color: 0x333333 }));
            t.rotation.x = -Math.PI/2; t.position.z = -i*10;
            scene.add(t); floor.push(t);
        }

        let trickRot = { x: 0, y: 0 };
        let isDoingTrick = false;

        function doTrick(name, x, y) {
            isDoingTrick = true;
            const el = document.getElementById('trick-alert');
            el.innerText = name; el.style.opacity = "1";
            multiplier++; score += 100;
            trickRot.x = x; trickRot.y = y;
            setTimeout(() => { el.style.opacity = "0"; isDoingTrick = false; }, 800);
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !spacePressed) {
                spacePressed = true;
                const now = Date.now();
                if (!gameActive) { startGame(); return; }
                if (now - lastSpaceRelease < 200 && isGrounded) {
                    velocityY = JUMP_FORCE; isGrounded = false;
                    doTrick("DOUBLE KICKFLIP", 0.6, 0.2);
                } else if (isGrounded) {
                    velocityY = JUMP_FORCE; isGrounded = false;
                }
            }
            if (!isGrounded && !isGrinding) {
                if (e.code === 'ArrowUp') doTrick("360 SHUVIT", 0, 0.4);
                if (e.code === 'ArrowDown') doTrick("HEELFLIP", 0.4, 0.4);
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                spacePressed = false;
                lastSpaceRelease = Date.now();
                if (isGrinding) exitGrind(0.15);
            }
        });

        function startGame() {
            gameActive = true;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            score = 0; multiplier = 1;
        }

        function exitGrind(pop) {
            isGrinding = false; isGrounded = false;
            velocityY = pop; boardGroup.rotation.y = 0;
        }

        function handleGameOver() {
            document.getElementById('flash').style.opacity = '1';
            setTimeout(() => document.getElementById('flash').style.opacity = '0', 100);
            gameActive = false; isGrinding = false;
            document.getElementById('overlay').style.display = 'flex';
            obstacles.forEach(o => scene.remove(o)); obstacles.length = 0;
            boardGroup.rotation.set(0,0,0);
        }

        let spawnTimer = 0;

        function animate() {
            requestAnimationFrame(animate);
            if (!gameActive) { camera.lookAt(0,0,0); renderer.render(scene, camera); return; }

            // Dynamic Camera States
            if (isGrinding) {
                targetCamX = 18; targetCamZ = 4;
            } else if (isDoingTrick) {
                targetCamX = 0; targetCamZ = 12;
            } else {
                targetCamX = 12; targetCamZ = 8;
            }

            camX += (targetCamX - camX) * LERP_SPEED;
            camZ += (targetCamZ - camZ) * LERP_SPEED;
            camera.position.set(camX, 5, camZ);
            camera.lookAt(0, 0, -5);

            // Sideways Board Logic
            if (isGrinding) {
                boardGroup.position.y = 1.48;
                boardGroup.rotation.y = Math.PI / 2; // Sideways for slides
                score += 2;
            } else if (!isGrounded) {
                velocityY += GRAVITY;
                boardGroup.position.y += velocityY;
                boardGroup.rotation.x += trickRot.x; boardGroup.rotation.y += trickRot.y;
                if (boardGroup.position.y <= 0.5) {
                    boardGroup.position.y = 0.5; boardGroup.rotation.set(0,0,0);
                    trickRot = { x:0, y:0 }; velocityY = 0; isGrounded = true;
                }
            }

            floor.forEach(t => { t.position.z += speed; if(t.position.z > 20) t.position.z = -230; });

            if (++spawnTimer > 160) { spawnObstacle(); spawnTimer = 0; }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                const o = obstacles[i]; o.position.z += speed;
                const dx = Math.abs(boardGroup.position.x - o.position.x);
                const dz = Math.abs(boardGroup.position.z - o.position.z);
                const dy = boardGroup.position.y - o.position.y;

                if (dx < 1.8 && dz < o.userData.halfLen) {
                    if (o.userData.isRail && spacePressed && dy > 0) { isGrinding = true; }
                    else if (!isGrinding && Math.abs(dy) < 0.7) { handleGameOver(); }
                } else if (isGrinding && o.userData.isRail && dz >= o.userData.halfLen) {
                    exitGrind(0.12); // Pop off cleanly
                }
                if (o.position.z > 25) { scene.remove(o); obstacles.splice(i, 1); score += 10; }
            }

            document.getElementById('score').innerText = Math.floor(score);
            document.getElementById('multiplier').innerText = `COMBO x${multiplier}`;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
