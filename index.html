<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fingerboard Hero</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Arial Black', sans-serif; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px #000; pointer-events: none; z-index: 10; display: none; }
        
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; color: white; z-index: 20;
            text-align: center; padding: 20px; box-sizing: border-box;
        }

        /* Responsive Instruction Text */
        .desktop-info { display: block; }
        .mobile-info { display: none; }

        @media (max-width: 900px) {
            .desktop-info { display: none; }
            .mobile-info { display: block; }
        }

        #trick-alert { position: absolute; top: 25%; left: 50%; transform: translateX(-50%); color: #00ff00; font-size: 2rem; text-shadow: 3px 3px #000; font-style: italic; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
        #flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; z-index: 30; }
        
        /* MOBILE BUTTONS */
        #mobile-controls {
            position: absolute; bottom: 40px; width: 100%; display: none;
            justify-content: space-around; align-items: center; z-index: 25; padding: 0 20px; box-sizing: border-box;
        }
        .btn {
            width: 80px; height: 80px; background: rgba(255,255,255,0.15); 
            border: 4px solid white; border-radius: 50%; color: white;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.5rem; user-select: none; -webkit-tap-highlight-color: transparent;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .btn:active { background: rgba(255,255,255,0.4); transform: scale(0.9); }
        #jump-btn { width: 110px; height: 110px; background: rgba(0, 255, 100, 0.2); font-weight: bold; }

        @media (max-width: 900px) { #mobile-controls { display: flex; } }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="flash"></div>
    <div id="trick-alert">TRICK!</div>

    <div id="overlay" onclick="startGame()">
        <h1>FINGERBOARD HERO</h1>
        
        <div class="desktop-info">
            <p>PRESS [SPACE] TO START</p>
            <p style="font-size: 0.9rem; opacity: 0.8;">ARROWS: TRICKS | HOLD SPACE: GRIND</p>
        </div>

        <div class="mobile-info">
            <p>TAP SCREEN TO START</p>
            <p style="font-size: 0.9rem; opacity: 0.8;">USE ON-SCREEN BUTTONS TO SKATE</p>
        </div>
        
        <p style="font-size: 0.7rem; margin-top: 20px; color: #aaa;">MUSIC BY PRODITO</p>
    </div>

    <div id="ui">
        <h1 style="margin:0">SCORE: <span id="score">0</span></h1>
        <h2 id="multiplier" style="margin:0">COMBO x1</h2>
    </div>

    <div id="mobile-controls">
        <div class="btn" id="left-btn">FLIP</div>
        <div class="btn" id="jump-btn">JUMP</div>
        <div class="btn" id="right-btn">SHUV</div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

        // --- AUDIO ---
        const soundtracks = ['./data/prodito1.mp3', './data/prodito2.mp3'];
        let currentTrack = new Audio();
        currentTrack.loop = true;

        function playRandomTrack() {
            const trackFile = soundtracks[Math.floor(Math.random() * soundtracks.length)];
            currentTrack.src = trackFile;
            currentTrack.play().catch(() => {});
        }

        function stopMusic() { currentTrack.pause(); currentTrack.currentTime = 0; }

        // --- STATE ---
        let gameActive = false, isGrounded = true, isGrinding = false;
        let score = 0, multiplier = 1, speed = 0.45, velocityY = 0;
        let jumpActive = false, lastJumpTime = 0;
        const GRAVITY = -0.014, JUMP_FORCE = 0.38, RAMP_BOOST = 0.52;

        let camX = 12, targetCamX = 12, camZ = 8, targetCamZ = 8;
        const LERP_SPEED = 0.05;

        // --- THREE.JS SETUP ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x87CEEB, 20, 150);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        // --- BOARD ---
        const boardGroup = new THREE.Group();
        const deck = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.15, 3.5), new THREE.MeshStandardMaterial({ color: 0x222222 }));
        boardGroup.add(deck);
        [[0.5,-0.3,1.2], [-0.5,-0.3,1.2], [0.5,-0.3,-1.2], [-0.5,-0.3,-1.2]].forEach(p => {
            const w = new THREE.Mesh(new THREE.CylinderGeometry(0.28,0.28,0.2,8), new THREE.MeshStandardMaterial({color:0xffffff}));
            w.position.set(...p); w.rotation.z = Math.PI/2; boardGroup.add(w);
        });
        boardGroup.position.y = 0.5;
        scene.add(boardGroup);

        // --- OBSTACLES ---
        const obstacles = [];
        function createBanner(text) {
            const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(255, 255, 0, 0.9)'; ctx.fillRect(0,0,256,64);
            ctx.font = 'bold 35px Arial'; ctx.fillStyle = 'black'; ctx.textAlign = 'center';
            ctx.fillText(text, 128, 45);
            return new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
        }

        function spawnObstacle() {
            const rand = Math.random();
            let obs, type, len = 0.6, isRail = false, isRamp = false;
            if (rand < 0.3) {
                isRamp = true;
                obs = new THREE.Mesh(new THREE.BoxGeometry(5, 2, 6), new THREE.MeshStandardMaterial({ color: 0x777777 }));
                obs.rotation.x = Math.PI / 10; obs.position.y = 0.1;
                type = "BIG AIR";
            } else if (rand < 0.7) {
                isRail = true;
                len = 12 + Math.random() * 20;
                obs = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, len), new THREE.MeshStandardMaterial({ color: 0xffcc00 }));
                obs.position.y = 1.2;
                type = "SLIDE";
            } else {
                obs = new THREE.Mesh(new THREE.BoxGeometry(5, 1.2, 0.6), new THREE.MeshStandardMaterial({ color: 0xff4444 }));
                obs.position.y = 0.6;
                type = "JUMP";
            }
            const banner = createBanner(type); banner.scale.set(4, 1, 1); banner.position.y = 3;
            obs.add(banner);
            obs.userData = { isRail, isRamp, type, halfLen: (isRamp ? 3 : len/2) };
            obs.position.z = -150;
            scene.add(obs);
            obstacles.push(obs);
        }

        const floor = [];
        for(let i=0; i<25; i++) {
            const t = new THREE.Mesh(new THREE.PlaneGeometry(60, 10), new THREE.MeshStandardMaterial({ color: 0x333333 }));
            t.rotation.x = -Math.PI/2; t.position.z = -i*10;
            scene.add(t); floor.push(t);
        }

        // --- TRICK LOGIC ---
        let trickRot = { x: 0, y: 0 };
        let isDoingTrick = false;

        function doTrick(name, x, y) {
            isDoingTrick = true;
            const el = document.getElementById('trick-alert');
            el.innerText = name; el.style.opacity = "1";
            multiplier++; score += 100;
            trickRot.x = x; trickRot.y = y;
            setTimeout(() => { el.style.opacity = "0"; isDoingTrick = false; }, 800);
        }

        // --- HYBRID INPUT HANDLERS ---
        function onJumpStart() {
            if (!gameActive) { startGame(); return; }
            jumpActive = true;
            const now = Date.now();
            if (now - lastJumpTime < 200 && isGrounded) {
                velocityY = JUMP_FORCE; isGrounded = false;
                doTrick("DOUBLE KICKFLIP", 0.6, 0.2);
            } else if (isGrounded) {
                velocityY = JUMP_FORCE; isGrounded = false;
            }
            lastJumpTime = now;
        }

        function onJumpEnd() {
            jumpActive = false;
            if (isGrinding) { isGrinding = false; isGrounded = false; velocityY = 0.15; boardGroup.rotation.y = 0; }
        }

        // Listeners
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !jumpActive) onJumpStart();
            if (!isGrounded && !isGrinding) {
                if (e.code === 'ArrowUp') doTrick("360 SHUVIT", 0, 0.4);
                if (e.code === 'ArrowDown') doTrick("HEELFLIP", 0.4, 0.4);
            }
        });
        window.addEventListener('keyup', (e) => { if (e.code === 'Space') onJumpEnd(); });

        const bindTouch = (id, start, end) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); start(); });
            if (end) el.addEventListener('touchend', (e) => { e.preventDefault(); end(); });
        };

        bindTouch('jump-btn', onJumpStart, onJumpEnd);
        bindTouch('left-btn', () => doTrick("KICKFLIP", 0.4, 0));
        bindTouch('right-btn', () => doTrick("SHUVIT", 0, 0.4));

        function startGame() {
            if (gameActive) return;
            gameActive = true;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            score = 0; multiplier = 1;
            playRandomTrack();
        }
        window.startGame = startGame;

        function handleGameOver() {
            document.getElementById('flash').style.opacity = '1';
            setTimeout(() => document.getElementById('flash').style.opacity = '0', 100);
            gameActive = false; isGrinding = false;
            document.getElementById('overlay').style.display = 'flex';
            obstacles.forEach(o => scene.remove(o)); obstacles.length = 0;
            boardGroup.rotation.set(0,0,0);
            stopMusic();
        }

        let spawnTimer = 0;
        function animate() {
            requestAnimationFrame(animate);
            if (!gameActive) { camera.lookAt(0,0,0); renderer.render(scene, camera); return; }

            // Camera Logic
            if (isGrinding) { targetCamX = 18; targetCamZ = 4; }
            else if (isDoingTrick) { targetCamX = 0; targetCamZ = 12; }
            else { targetCamX = 12; targetCamZ = 8; }

            camX += (targetCamX - camX) * LERP_SPEED;
            camZ += (targetCamZ - camZ) * LERP_SPEED;
            camera.position.set(camX, 5, camZ);
            camera.lookAt(0, 0, -5);

            // Sideways Grinds & Physics
            if (isGrinding) {
                boardGroup.position.y = 1.48; boardGroup.rotation.y = Math.PI / 2; // Sideways
                score += 2;
            } else if (!isGrounded) {
                velocityY += GRAVITY;
                boardGroup.position.y += velocityY;
                boardGroup.rotation.x += trickRot.x; boardGroup.rotation.y += trickRot.y;
                if (boardGroup.position.y <= 0.5) {
                    boardGroup.position.y = 0.5; boardGroup.rotation.set(0,0,0);
                    trickRot = { x:0, y:0 }; velocityY = 0; isGrounded = true;
                }
            }

            floor.forEach(t => { t.position.z += speed; if(t.position.z > 20) t.position.z = -230; });
            if (++spawnTimer > 150) { spawnObstacle(); spawnTimer = 0; }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                const o = obstacles[i]; o.position.z += speed;
                const dx = Math.abs(boardGroup.position.x - o.position.x);
                const dz = Math.abs(boardGroup.position.z - o.position.z);
                const dy = boardGroup.position.y - o.position.y;

                if (o.userData.isRamp && dx < 2.5 && dz < 3 && isGrounded && o.position.z < boardGroup.position.z) {
                    velocityY = RAMP_BOOST; isGrounded = false;
                    score += 500;
                    document.getElementById('trick-alert').innerText = "BIG AIR!";
                    document.getElementById('trick-alert').style.opacity = "1";
                    setTimeout(() => document.getElementById('trick-alert').style.opacity = "0", 800);
                }

                if (dx < 1.8 && dz < o.userData.halfLen) {
                    if (o.userData.isRail && jumpActive && dy > 0) { isGrinding = true; }
                    else if (!isGrinding && !o.userData.isRamp && Math.abs(dy) < 0.7) { handleGameOver(); }
                } else if (isGrinding && o.userData.isRail && dz >= o.userData.halfLen) {
                    isGrinding = false; isGrounded = false; velocityY = 0.12; boardGroup.rotation.y = 0;
                }
                if (o.position.z > 25) { scene.remove(o); obstacles.splice(i, 1); score += 10; }
            }

            document.getElementById('score').innerText = Math.floor(score);
            document.getElementById('multiplier').innerText = `COMBO x${multiplier}`;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
